<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 English with Ali</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent-color: #2563eb; --text-color: #f8fafc; --text-muted: #94a3b8; --success: #10b981; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 650px; width: 100%; }
        .main-card { background-color: var(--card-bg); border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); margin-bottom: 40px; margin-top: 20px; }
        .main-card h1 { font-size: 2rem; margin-bottom: 15px; }
        .main-card p { font-size: 1.1rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
        .main-btn { background-color: var(--accent-color); color: white; border: none; padding: 14px 32px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .footer-text { margin-top: 25px; font-size: 0.85rem; color: #475569; }
        .practice-section { border-top: 2px dashed #334155; padding-top: 30px; }
        .section-title { text-align: center; font-size: 1.6rem; color: #60a5fa; margin-bottom: 25px; }
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .tab-btn { background-color: var(--card-bg); color: var(--text-color); border: 2px solid transparent; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active, .tab-btn:hover { border-color: #3b82f6; background-color: #1d4ed8; }
        .phrase-card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .phrase-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .category-badge { background-color: #334155; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; color: #38bdf8; font-weight: bold; }
        .movie-link { background-color: #ef4444; color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .english-txt { font-size: 1.3rem; font-weight: bold; margin: 10px 0; }
        .kazakh-txt { font-size: 1rem; color: var(--text-muted); margin-bottom: 15px; }
        .practice-zone { margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
        .practice-zone label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: var(--text-muted); }
        .input-group { display: flex; gap: 10px; }
        .user-input { flex: 1; background-color: #0f172a; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; }
        .check-btn { background-color: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .result-msg { margin-top: 10px; font-size: 0.9rem; font-weight: bold; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="main-card">
        <h1>🔥 English with Ali</h1>
        <p>Young & Sigma: Ағылшынша 1000 тірі сөйлем мен сленгтер жинағына қош келдіңіз!</p>
        <button class="main-btn" onclick="scrollToPractice()">Жинақты Жүктеу</button>
        <div class="footer-text">Created by Ali | 2026</div>
    </div>
    <div class="practice-section" id="practice-area">
        <h2 class="section-title">🚀 Интерактивті Жаттығу Платформасы</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="filterCat('all')">Барлығы</button>
            <button class="tab-btn" onclick="filterCat('slang')">Gen-Z Slang</button>
            <button class="tab-btn" onclick="filterCat('cinema')">Кинофильмдер</button>
        </div>
        <div id="phrases-list"></div>
    </div>
</div>
<script>
    const phrasesData = [
        { id: 1, eng: "No cap, he's actually a genius.", kaz: "Өтіріксіз (шынымен), ол нағыз данышпан.", cat: "slang", badge: "😎 Тірі Сленг", video: "https://www.youtube.com/results?search_query=no+cap+meme+clip" },
        { id: 2, eng: "Why so serious?", kaz: "Неге соншалықты салмақтысың?", cat: "cinema", badge: "🎬 The Dark Knight", video: "https://www.youtube.com/watch?v=tPZBPVbTWhE" },
        { id: 3, eng: "He has that unspoken rizz.", kaz: "Оның ерекше харизмасы бар.", cat: "slang", badge: "🔥 Sigma Vibes", video: "https://www.youtube.com/results?search_query=unspoken+rizz+clip" }
    ];
    function scrollToPractice() { document.getElementById('practice-area').scrollIntoView({ behavior: 'smooth' }); }
    function renderPhrases(filter = 'all') {
        const listContainer = document.getElementById('phrases-list'); listContainer.innerHTML = '';
        const filtered = filter === 'all' ? phrasesData : phrasesData.filter(p => p.cat === filter);
        filtered.forEach(p => {
            const card = document.createElement('div'); card.className = 'phrase-card';
            card.innerHTML = `<div class="phrase-header"><span class="category-badge">${p.badge}</span><a href="${p.video}" target="_blank" class="movie-link">🍿 Видео</a></div>
                <div class="english-txt">${p.eng}</div><div class="kazakh-txt"><b>Қазақшасы:</b> ${p.kaz}</div>
                <div class="practice-zone"><label>✍️ Ағылшынша жазып шық:</label><div class="input-group">
                <input type="text" class="user-input" id="input-${p.id}"><button class="check-btn" onclick="checkAnswer(${p.id}, '${p.eng.replace(/'/g, "\\'")}')">Тексеру</button></div>
                <div class="result-msg" id="msg-${p.id}"></div></div>`;
            listContainer.appendChild(card);
        });
    }
    function checkAnswer(id, correctText) {
        const userInput = document.getElementById(`input-${id}`).value.trim(); const msgDiv = document.getElementById(`msg-${id}`); msgDiv.style.display = 'block';
        if(userInput.toLowerCase() === correctText.toLowerCase()) { msgDiv.innerHTML = "✅ Дұрыс! Нағыз Sigma!"; msgDiv.style.color = "var(--success)"; }
        else { msgDiv.innerHTML = `❌ Қате бар. Қайта жаз: "${correctText}"`; msgDiv.style.color = "var(--error)"; }
    }
    function filterCat(cat) { document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); event.target.classList.add('active'); renderPhrases(cat); }
    renderPhrases();
</script>
</body>
</html>
